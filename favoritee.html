<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essencia Favoriler</title>

  <link rel="stylesheet" href="favorite.css">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="main-navbar">
    <div class="nav-container">

      <div class="nav-logo">
        <a href="index.html">ESSENCIA</a>
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Anasayfa</a></li>

        <li class="dropdown">
          <button class="dropdown-trigger" type="button">Atölye ▾</button>
          <ul class="dropdown-menu">
            <li><a href="kadin.html">Kadın</a></li>
            <li><a href="erkekparfum.html">Erkek</a></li>
          </ul>
        </li>

        <li><a href="#" id="triggerFav" class="nav-btn-link">Favorilerim</a></li>
        <li><a href="iletisim.html">İletişim</a></li>
        <li><a href="girisekranı.html" class="auth-btn">Giriş Yap</a></li>
        <li><a href="sepet.html" class="nav-btn-link">Sepet</a></li>
      </ul>

    </div>
  </nav>

  <!-- BOŞ ANA EKRAN -->
  <main class="empty-page"></main>

  <!-- FAVORİLER EKRANI -->
  <div class="fav-full-screen is-active" id="favScreen">
    <button class="close-btn" id="closeFavBtn" type="button">&times;</button>

    <div class="fav-container">
      <div class="fav-header-area">
        <span>Essencia</span>
        <h2>Favorilerim</h2>
        <p>Favoriye eklediğiniz parfümler burada görünür.</p>
      </div>

      <div class="fav-grid" id="favGrid">
        <div class="fav-item-card female-card">
          <div class="fav-info">
            <h4>Rose Velvet</h4>
            <p>Gül · Şakayık · Misk</p>
          </div>
        </div>

        <div class="fav-item-card male-card">
          <div class="fav-info">
            <h4>Dark Oud</h4>
            <p>Oud · Duman · Amber</p>
          </div>
        </div>
      </div>

      <button class="checkout-all-btn" type="button">Tümünü İncele</button>
    </div>
  </div>

  <!-- JS EN ALTTA -->
  <script>
    const triggerFav = document.getElementById("triggerFav");
    const closeFavBtn = document.getElementById("closeFavBtn");
    const favScreen = document.getElementById("favScreen");

    triggerFav.addEventListener("click", function(event) {
      event.preventDefault();
      favScreen.classList.add("is-active");
    });

    closeFavBtn.addEventListener("click", function() {
      favScreen.classList.remove("is-active");
    });

    favScreen.addEventListener("click", function(event) {
      if (event.target === favScreen) {
        favScreen.classList.remove("is-active");
      }
    });
  </script>

</body>
</html>
