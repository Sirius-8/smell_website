<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essencia Favoriler</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="favorite.css">
  <link rel="stylesheet" href="iletisim.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="site-nav">
    <div class="nav-brand">
      <a href="index.html" class="nav-logo">E<span>SS</span>ENCIA</a>
      <div class="nav-slogan">Kendini Keşfet</div>
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Anasayfa</a></li>

      <li class="nav-dropdown">
        <a href="#" class="dropdown-toggle">Atölye ▾</a>
        <ul class="dropdown-menu">
          <li><a href="kadin.html">Kadın</a></li>
          <li><a href="erkekparfum.html">Erkek</a></li>
        </ul>
      </li>

      <li><a href="favoritee.html">Favorilerim</a></li>
      <li><a href="#" onclick="toggleSidebar(); return false;">İletişim</a></li>
    </ul>

    <div class="nav-right">
      <a href="girisekranı.html" class="nav-btn" style="text-decoration: none;">Kayıt Ol</a>
      <button class="nav-cart" aria-label="Sepet" onclick="window.location.href='sepet.html'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="nav-cart-label">Sepet</span>
      </button>
    </div>
  </nav>

  <!-- BOŞ ANA EKRAN -->
  <main class="empty-page"></main>

  <!-- FAVORİLER EKRANI -->
  <div class="fav-full-screen is-active" id="favScreen">
    <button class="close-btn" id="closeFavBtn" type="button">&times;</button>

    <div class="fav-container">
      <div class="fav-header-area">
        <span>ESSENCIA</span>
        <h2>Favorilerim</h2>
        <p>Favoriye eklediğiniz parfümler burada görünür.</p>
      </div>

      <div class="fav-grid-wrapper">
        <div class="fav-grid" id="favGrid">
          <!-- Dinamik olarak dolacak -->
        </div>

        <!-- DAHA FAZLA GÖR OVERLAY -->
        <div class="fav-more-overlay" id="favMoreOverlay">
          <button class="more-btn" type="button" onclick="window.location.href='index.html'">Keşfetmeye Devam Et</button>
        </div>
      </div>
    </div>
  </div>

  <!-- JS EN ALTTA -->
  <script src="favorites.js"></script>
  <script>
    const closeFavBtn = document.getElementById("closeFavBtn");
    const favScreen = document.getElementById("favScreen");

    if (closeFavBtn) {
      closeFavBtn.addEventListener("click", function() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = "index.html";
        }
      });
    }
    if (favScreen) {
      favScreen.addEventListener("click", function(event) {
        if (event.target === favScreen) {
          if (window.history.length > 1) {
            window.history.back();
          } else {
            window.location.href = "index.html";
          }
        }
      });
    }

    // Overlay kontrolü: Kart sayısı 2'den fazlaysa göster
    const favGrid = document.getElementById("favGrid");
    const favMoreOverlay = document.getElementById("favMoreOverlay");
    if (favGrid && favMoreOverlay) {
      if (favGrid.children.length > 2) {
        favMoreOverlay.classList.add("is-visible");
      } else {
        favMoreOverlay.classList.remove("is-visible");
      }
    }
  </script>

</body>
</html>
